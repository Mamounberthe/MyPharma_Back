services:
  # Laravel Backend API
  - type: web
    name: mypharma-api
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://mypharma-back-1.onrender.com
      - key: APP_FRONTEND_URL
        value: https://my-pharma-front.vercel.app
      - key: SANCTUM_STATEFUL_DOMAINS
        value: my-pharma-front.vercel.app
      - key: SESSION_DOMAIN
        value: .onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: mypharma-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mypharma-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: mypharma-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mypharma-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mypharma-db
          property: password
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: public
      # RUN_SEEDS=true — à définir manuellement via le dashboard Render si nécessaire

databases:
  # PostgreSQL Database
  - name: mypharma-db
    databaseName: mypharma
    user: mypharma_user
    plan: free
